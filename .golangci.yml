run:
  timeout: 5m

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofumpt
    - misspell
    - unconvert
    - bidichk
    - durationcheck

linters-settings:
  gofumpt:
    extra-rules: true
  misspell:
    locale: US

issues:
  exclude-dirs: [ "examples", "benchmark", "cmd", "maybe_later" ]
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude:
    - 'ST1000: at least one file in a package should have a package comment'
  exclude-rules:
    # Test helpers routinely ignore errors from setup/teardown calls.
    - path: _test\.go
      linters:
        - errcheck
    # This assertion helper writes to a tabwriter/buffer that never errors.
    - path: http2utils/utils.go
      linters:
        - errcheck
    # Byte slices are intentionally pooled; the SA6002 pointer-wrapping
    # micro-optimisation is not worth the churn here.
    - path: (hpack|serverConn)\.go
      text: 'SA6002'
